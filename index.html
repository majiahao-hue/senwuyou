<style>
/* ═══ DESIGN TOKENS ═══ Inspired by CJ/Hetbahn + Japanese Premium Aesthetic */
:root{
  --ink:#0f1914;
  --ink-d:#040a08;
  --paper:#fbf9f5;
  --paper-card:#f7f4ed;
  --green:#0b5e3e;
  --green-d:#073b27;
  --green-soft:#e6f0eb;
  --green-pale:#d4e6dd;
  --gold:#c89b4c;
  --gold-light:#f0e4cc;
  --gold-pale:#faf3e6;
  --amber:#a87a2e;
  --muted:#8a8376;
  --muted-l:#b5afa3;
  --line:#e2dbce;
  --line-l:#efe9df;
  --glass:rgba(255,255,255,.78);
  --glass-d:rgba(11,94,62,.85);
  --shadow-sm:0 2px 8px rgba(15,25,20,.05);
  --shadow:0 8px 32px rgba(15,25,20,.07);
  --shadow-l:0 24px 64px rgba(15,25,20,.1);
  --shadow-card:0 4px 24px rgba(15,25,20,.04);
  --radius-sm:8px;
  --radius:14px;
  --radius-l:24px;
  --radius-xl:32px;
  --font-sans:'Inter','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
  --font-serif:'Playfair Display','Noto Serif SC',serif;
  --nav-h:72px;
  --max-w:1200px;
  --max-w-wide:1400px;
}

/* ═══ RESET & BASE ═══ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-sans);color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;line-height:1.7;overflow-x:hidden;font-weight:400}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
.en{font-family:var(--font-serif);font-weight:700;letter-spacing:-.02em}
.en-caps{font-family:var(--font-sans);letter-spacing:.22em;text-transform:uppercase;font-weight:700;font-size:11px}
::selection{background:var(--green);color:#fff}

/* ═══ PROGRESS BAR ═══ */
.progress{position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,var(--green),var(--gold));z-index:3000;transition:width .15s ease-out}

/* ═══ NAVIGATION ═══ (Hetbahn-inspired: clean, premium, glass) */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(20px,4vw,48px);transition:background .5s cubic-bezier(.16,1,.3,1),box-shadow .5s cubic-bezier(.16,1,.3,1),backdrop-filter .5s}
.nav.scrolled{background:rgba(251,249,245,.82);backdrop-filter:saturate(160%) blur(24px);-webkit-backdrop-filter:saturate(160%) blur(24px);box-shadow:0 1px 0 var(--line-l)}
.nav-logo{display:flex;align-items:center;gap:14px;cursor:pointer;flex-shrink:0}
.nav-logo .logo-img{height:38px;width:auto;max-width:160px;display:block;border-radius:4px;object-fit:contain}
.nav-logo .brand-group{display:flex;flex-direction:column;line-height:1.2}
.nav-logo .brand-group .brand-name{font-size:22px;font-weight:700;letter-spacing:-.03em;color:var(--ink)}
.nav-logo .brand-group .brand-name span{font-family:var(--font-serif);font-weight:600;color:var(--green);margin-left:4px;font-size:15px;letter-spacing:.06em;font-style:italic}
.nav-logo .brand-group .brand-sub{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.nav-tabs{display:flex;gap:2px;background:var(--paper-card);padding:3px;border-radius:100px}
.nav-tabs button{padding:8px 18px;border:none;background:none;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .35s cubic-bezier(.16,1,.3,1);position:relative;border-radius:100px;line-height:1.4;white-space:nowrap}
.nav-tabs button .tab-en{display:block;font-size:9px;letter-spacing:.18em;text-transform:uppercase;opacity:.6;margin-top:1px}
.nav-tabs button:hover{color:var(--ink)}
.nav-tabs button.on{color:#fff;background:var(--green);box-shadow:0 2px 8px rgba(11,94,62,.25)}
.nav-tabs button.on .tab-en{opacity:.8;color:rgba(255,255,255,.8)}

/* ═══ FLOATING BACK BTN ═══ */
.fab{position:fixed;top:84px;left:clamp(12px,2vw,24px);z-index:999;display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:100px;border:none;background:rgba(11,94,62,.85);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 4px 20px rgba(11,94,62,.25)}
.fab:hover{background:var(--green-d);transform:translateX(-4px);box-shadow:0 6px 28px rgba(11,94,62,.35)}
.fab.hidden{display:none!important}

/* ═══ SCROLL REVEAL ═══ */
.reveal{opacity:0;transform:translateY(32px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1)}
.reveal.in{opacity:1;transform:none}
.ph{overflow:hidden;border-radius:var(--radius)}
.ph img{transform:scale(1.1);transition:transform 1.4s cubic-bezier(.16,1,.3,1)}
.reveal.in .ph img{transform:scale(1)}
.clip-reveal{clip-path:inset(0 50% 0 50%);transition:clip-path 1.2s cubic-bezier(.16,1,.3,1)}
.clip-reveal.in{clip-path:inset(0 0 0 0)}
.mask{overflow:hidden;display:block}
.mask>span{display:block;transform:translateY(110%);transition:transform 1s cubic-bezier(.16,1,.3,1)}
.mask.show>span{transform:none}

@media(prefers-reduced-motion:reduce){.reveal,.clip-reveal{opacity:1;transform:none;clip-path:inset(0)}.ph img{transform:none}}

/* ═══ SECTION BACKGROUND ═══ */
.sec-bg{position:relative;max-width:none;padding:0}
.sec-bg .bg-img{position:absolute;inset:0;z-index:0;overflow:hidden;background:var(--paper-card)}
.sec-bg .bg-img .fb-wrap{opacity:.2}
.sec-bg .bg-img .bg-fb{opacity:.18}
.sec-bg .bg-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(135deg,rgba(11,94,62,.85),rgba(7,59,39,.92))}
.sec-bg .inner{position:relative;z-index:2;padding:clamp(60px,8vw,120px) clamp(20px,5vw,60px);max-width:var(--max-w);margin:0 auto}
.sec-bg:not(.dark) .bg-overlay{display:none}
.sec-bg:not(.dark) .inner{padding:clamp(50px,6vw,100px) clamp(20px,5vw,60px)}
.sec-bg.dark{color:#fff}
.sec-bg.dark .bg-img{filter:saturate(.7) brightness(.5)}
.sec-bg.dark .eyebrow.d{color:rgba(255,255,255,.5)}
.sec-bg.dark .h2 .en{color:rgba(255,255,255,.35)}
.sec-bg.dark .sec-sub{color:rgba(255,255,255,.6)}
.sec-bg.dark .note{background:rgba(255,255,255,.08);border-left:3px solid var(--gold)}

/* ═══ GLOBAL BAR (CERTIFICATION STRIP) ═══ */
.global-bar{display:flex;justify-content:center;flex-wrap:wrap;gap:0;padding:16px clamp(20px,4vw,48px);background:var(--green-d);color:rgba(255,255,255,.7);font-size:11px;font-weight:500;letter-spacing:.04em}
.global-item{padding:4px 20px;border-right:1px solid rgba(255,255,255,.1)}
.global-item:last-child{border-right:none}
.global-item b{color:#fff;font-weight:700}

/* ═══ SECTION HEADERS ═══ */
.sec-head{text-align:center;margin-bottom:clamp(32px,4vw,56px)}
.eyebrow,.eyebrow.d{display:inline-block;font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;color:var(--muted);margin-bottom:14px;font-family:var(--font-sans)}
.h2{font-size:clamp(28px,3.6vw,44px);font-weight:700;line-height:1.2;letter-spacing:-.025em;margin-bottom:12px}
.h2 .en{display:block;font-size:clamp(14px,1.8vw,22px);color:var(--muted-l);margin-top:6px;letter-spacing:-.01em}
.sec-sub{font-size:clamp(14px,1.4vw,17px);color:var(--muted);max-width:620px;margin:0 auto;line-height:1.6}

/* ═══ HERO SECTION ═══ (CJ-style: full-bleed, immersive) */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg .fb-wrap .fb-icon{font-size:clamp(80px,15vw,160px);opacity:.25}
.hero-bg .fb-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:0;pointer-events:none}
.hero-bg img{width:100%;height:100%;object-fit:cover}
.hero .bg-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(135deg,rgba(11,94,62,.88) 0%,rgba(7,59,39,.75) 40%,rgba(4,10,8,.5) 100%)}
.hero-inner{position:relative;z-index:2;max-width:var(--max-w-wide);margin:0 auto;padding:clamp(100px,10vw,140px) clamp(24px,5vw,60px);display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center;width:100%}
.hero-txt{color:#fff}
.hero-eyebrow{display:inline-block;font-size:11px;letter-spacing:.28em;text-transform:uppercase;font-weight:600;color:rgba(255,255,255,.6);margin-bottom:20px;border:1px solid rgba(255,255,255,.15);padding:6px 16px;border-radius:100px;backdrop-filter:blur(8px)}
.hero-txt h1{font-size:clamp(36px,5vw,64px);font-weight:700;line-height:1.1;letter-spacing:-.03em;margin-bottom:20px}
.hero-txt h1 em{font-style:normal;background:linear-gradient(135deg,var(--gold),#e0b860);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:clamp(14px,1.3vw,17px);color:rgba(255,255,255,.7);line-height:1.7;max-width:520px;margin-bottom:32px}
.hero-cta{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.btn-solid{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border:none;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1);font-family:var(--font-sans);background:var(--gold);color:var(--ink-d);box-shadow:0 4px 16px rgba(200,155,76,.3)}
.btn-solid:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(200,155,76,.4)}
.link-arrow{font-size:13px;font-weight:600;color:rgba(255,255,255,.8);cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:6px}
.link-arrow:hover{color:var(--gold);gap:10px}
.hero-floats{display:flex;flex-direction:column;gap:16px;padding:clamp(20px,3vw,40px);justify-self:end;width:100%;max-width:360px}
.hero-float{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:var(--radius);padding:16px 24px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px 16px;transition:all .4s cubic-bezier(.16,1,.3,1)}
.hero-float:hover{background:rgba(255,255,255,.14);transform:translateY(-2px)}
.hero-float .fl{font-size:11px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase}
.hero-float .fv{font-size:clamp(22px,2.4vw,32px);font-weight:700;color:#fff;letter-spacing:-.02em;grid-column:2;grid-row:1/3}
.hero-float .fd{font-size:12px;color:rgba(255,255,255,.45);grid-column:1}
.hero-img{position:relative;border-radius:var(--radius-l);overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.35);aspect-ratio:4/3;max-width:440px;justify-self:end;width:100%}
.hero-img img{width:100%;height:100%;object-fit:cover;display:block}
@media(max-width:860px){.hero-img{max-width:320px;justify-self:center}}
.scroll-hint{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);z-index:3;display:flex;flex-direction:column;align-items:center;gap:8px;color:rgba(255,255,255,.4);font-size:10px;letter-spacing:.2em}
.scroll-hint .line{width:1px;height:32px;background:rgba(255,255,255,.3);animation:scrollPulse 2s ease-in-out infinite}
@keyframes scrollPulse{0%,100%{opacity:.3;transform:scaleY(1)}50%{opacity:.8;transform:scaleY(1.4)}}

/* ═══ TRUST STRIP ═══ (Hetbahn metric bar) */
.trust{display:grid;grid-template-columns:repeat(4,1fr);gap:0;max-width:var(--max-w);margin:-40px auto 0;padding:0 clamp(20px,4vw,48px);position:relative;z-index:10}
.trust-item{background:#fff;padding:clamp(20px,2.5vw,36px) clamp(16px,2vw,28px);text-align:center;border-right:1px solid var(--line-l);border-bottom:1px solid var(--line-l);box-shadow:var(--shadow-card)}
.trust-item:first-child{border-radius:var(--radius) 0 0 var(--radius)}
.trust-item:last-child{border-right:none;border-radius:0 var(--radius) var(--radius) 0}
.trust-item b{display:block;font-size:clamp(28px,3.2vw,42px);font-weight:700;color:var(--green);line-height:1;margin-bottom:6px;font-family:var(--font-serif)}
.trust-item span{font-size:12px;color:var(--muted);line-height:1.5}
.trust-item span .en{font-size:10px;color:var(--muted-l);display:block;margin-top:2px}

/* ═══ FEATURE (ALTERNATING) ═══ */
.feature{display:grid;grid-template-columns:1fr 1fr;gap:clamp(24px,4vw,56px);align-items:center;margin-bottom:clamp(40px,5vw,72px)}.feature.rev{direction:rtl}.feature.rev>*{direction:ltr}
.feature-img{aspect-ratio:4/3;border-radius:var(--radius-l);overflow:hidden;position:relative;background:var(--paper-card);box-shadow:var(--shadow);min-height:200px}
.feature-img .fb-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:0;pointer-events:none}
.feature-img .fb-wrap .fb-icon{font-size:clamp(60px,10vw,100px);opacity:.28;color:var(--muted)}
.feature-img img{width:100%;height:100%;object-fit:cover;position:relative;z-index:1;display:block}
.feature-txt{max-width:480px}
.feature-txt .eyebrow-en{display:inline-block;font-size:10px;letter-spacing:.24em;text-transform:uppercase;font-weight:600;color:var(--muted);margin-bottom:12px;font-family:var(--font-sans)}
.feature-txt h3{font-size:clamp(20px,2.4vw,28px);font-weight:700;line-height:1.2;letter-spacing:-.02em;margin-bottom:16px}
.feature-txt h3 .en{display:block;font-size:clamp(14px,1.6vw,18px);color:var(--muted-l);margin-top:4px}
.feature-txt p{font-size:clamp(14px,1.2vw,16px);color:var(--muted);line-height:1.7;margin-bottom:20px}
.feature-txt .link-arrow{color:var(--green);font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:6px}
.feature-txt .link-arrow:hover{gap:10px;color:var(--green-d)}

/* ═══ PRODUCT FILM STRIP ═══ */
.film-wrap{position:relative}
.film{display:flex;gap:20px;overflow-x:auto;padding:8px 4px 16px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.film::-webkit-scrollbar{display:none}
.film-item{flex:0 0 clamp(200px,28vw,300px);scroll-snap-align:start;background:#fff;border-radius:var(--radius-l);overflow:hidden;cursor:pointer;transition:all .5s cubic-bezier(.16,1,.3,1);box-shadow:var(--shadow-card);border:1px solid var(--line-l)}
.film-item:hover{transform:translateY(-6px);box-shadow:var(--shadow-l)}
.film-item .fi-pic{aspect-ratio:1;overflow:hidden;position:relative;background:var(--paper-card)}
.film-item .fi-pic .fb-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:0;pointer-events:none}
.film-item .fi-pic .fb-wrap .fb-icon{font-size:clamp(48px,8vw,80px);opacity:.28}
.film-item .fi-pic img{width:100%;height:100%;object-fit:cover;transition:transform .6s cubic-bezier(.16,1,.3,1)}
.film-item:hover .fi-pic img{transform:scale(1.05)}
.fi-name{padding:14px 16px 4px;font-size:14px;font-weight:700;line-height:1.3}
.fi-name .en{display:block;font-size:12px;color:var(--muted);font-weight:600;font-family:var(--font-sans);margin-top:2px}
.fi-spec{padding:0 16px 16px;font-size:11px;color:var(--muted-l)}
.film-tag{display:flex;gap:6px;flex-wrap:wrap;padding:8px 16px 0}.film-tag span{font-size:10px;padding:3px 8px;border-radius:100px;background:var(--green-soft);color:var(--green);font-weight:600}
.film-fade{position:absolute;top:0;right:0;bottom:16px;width:60px;background:linear-gradient(90deg,transparent,var(--paper));pointer-events:none}

/* ═══ VALUES GRID ═══ */
.values{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:clamp(16px,2vw,28px)}
.value{background:rgba(255,255,255,.06);border-radius:var(--radius-l);padding:clamp(24px,2.5vw,36px);border:1px solid rgba(255,255,255,.08);transition:all .4s cubic-bezier(.16,1,.3,1)}
.sec-bg:not(.dark) .value{background:#fff;border-color:var(--line-l);box-shadow:var(--shadow-card)}
.sec-bg:not(.dark) .value:hover{box-shadow:var(--shadow);border-color:var(--green-pale);transform:translateY(-3px)}
.value .vi{font-size:clamp(32px,3.5vw,48px);margin-bottom:16px;line-height:1}
.value h4{font-size:clamp(16px,1.6vw,19px);font-weight:700;margin-bottom:10px;letter-spacing:-.01em}
.value p{font-size:clamp(13px,1.1vw,15px);line-height:1.6;color:var(--muted)}
.sec-bg.dark .value p{color:rgba(255,255,255,.65)}

/* ═══ TECH GRID ═══ */
.tech-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:clamp(16px,2vw,24px)}
.tech-block{background:#fff;border-radius:var(--radius-l);padding:clamp(24px,2.5vw,32px);border:1px solid var(--line-l);transition:all .4s cubic-bezier(.16,1,.3,1);box-shadow:var(--shadow-card)}
.tech-block:hover{box-shadow:var(--shadow);border-color:var(--green-pale);transform:translateY(-3px)}
.tech-block .tb-num{display:inline-block;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.08em;margin-bottom:12px;font-family:var(--font-sans)}
.tech-block h4{font-size:clamp(15px,1.4vw,18px);font-weight:700;margin-bottom:10px}
.tech-block p{font-size:clamp(13px,1.1vw,14px);color:var(--muted);line-height:1.6}

/* ═══ QUOTE ═══ */
.quote{max-width:var(--max-w);margin:0 auto;padding:clamp(40px,5vw,80px) clamp(24px,4vw,60px);text-align:center}
.quote .q-mark{font-size:clamp(60px,8vw,100px);font-family:var(--font-serif);color:var(--gold);line-height:.5;display:block;opacity:.5;margin-bottom:16px}
.quote p{font-size:clamp(16px,1.6vw,22px);font-weight:600;line-height:1.5;max-width:720px;margin:0 auto 16px;color:var(--ink)}
.quote .q-by{font-size:13px;color:var(--muted)}

/* ═══ ROWS (simple list) ═══ */
.rows{display:flex;flex-direction:column;gap:16px}
.row{display:grid;grid-template-columns:auto 1fr;gap:16px 20px;align-items:start;padding:20px 24px;background:rgba(255,255,255,.05);border-radius:var(--radius);border:1px solid rgba(255,255,255,.08)}
.sec-bg:not(.dark) .row{background:#fff;border-color:var(--line-l)}
.row .rn{font-size:clamp(28px,3vw,36px);font-weight:700;font-family:var(--font-serif);color:var(--green);line-height:1;grid-row:1/3}
.sec-bg.dark .row .rn{color:var(--gold)}
.row h4{font-size:clamp(15px,1.3vw,17px);font-weight:700;margin-bottom:4px}
.row p{font-size:clamp(13px,1.1vw,14px);color:var(--muted);line-height:1.6}
.sec-bg.dark .row p{color:rgba(255,255,255,.65)}

/* ═══ BIGROWS (Brand page) ═══ */
.bigrows{display:flex;flex-direction:column;gap:clamp(16px,2vw,24px)}
.bigrow{display:grid;grid-template-columns:1fr;gap:12px;padding:clamp(24px,3vw,36px);background:rgba(255,255,255,.05);border-radius:var(--radius-l);border:1px solid rgba(255,255,255,.08)}
.sec-bg:not(.dark) .bigrow{background:#fff;border-color:var(--line-l)}
.bigrow .bk{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.bigrow .bv{font-size:clamp(22px,2.4vw,32px);font-weight:700;letter-spacing:-.02em;margin-bottom:8px}
.bigrow .bd{font-size:clamp(13px,1.1vw,15px);line-height:1.6;color:var(--muted)}
.sec-bg.dark .bigrow .bd{color:rgba(255,255,255,.65)}

/* ═══ NOTE BOX ═══ */
.note{padding:16px 20px;border-radius:var(--radius-sm);font-size:13px;line-height:1.6;color:var(--muted);background:rgba(11,94,62,.04);border-left:3px solid var(--green)}
.note.gold{background:var(--gold-pale);border-left-color:var(--gold)}
.note p strong{color:var(--ink);font-weight:700}

/* ═══ TABLE ═══ */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius)}
.table-wrap{min-width:600px}
table{width:100%;border-collapse:collapse;font-size:14px;background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-card)}
table thead th{background:var(--green);color:#fff;padding:14px 18px;text-align:left;font-weight:600;font-size:12px;letter-spacing:.04em;white-space:nowrap}
table tbody td{padding:12px 18px;border-bottom:1px solid var(--line-l);color:var(--ink)}
table tbody tr:last-child td{border-bottom:none}
table tbody tr:hover{background:var(--green-soft)}
.sec-bg.dark table{background:rgba(255,255,255,.06)}
.sec-bg.dark table thead th{background:rgba(255,255,255,.12);color:#fff}
.sec-bg.dark table tbody td{border-bottom-color:rgba(255,255,255,.08);color:rgba(255,255,255,.85)}
.sec-bg.dark table tbody tr:hover{background:rgba(255,255,255,.08)}

/* ═══ CLOSING ═══ */
.closing{text-align:center;padding:clamp(60px,8vw,100px) clamp(24px,4vw,60px);max-width:var(--max-w);margin:0 auto}
.closing h2{font-size:clamp(28px,3.2vw,40px);font-weight:700;line-height:1.2;letter-spacing:-.02em;margin-bottom:16px}
.closing p{font-size:15px;color:var(--muted);margin-bottom:28px}

/* ═══ DETAIL PAGE ═══ */
.page-bg{position:fixed;inset:0;z-index:-1;overflow:hidden}
.page-bg .fb-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:0;pointer-events:none}
.page-bg .fb-wrap .fb-icon{font-size:clamp(60px,12vw,140px);opacity:.1}
.page-bg img{width:100%;height:100%;object-fit:cover;filter:saturate(.4) brightness(.8);opacity:.08}
.detail{max-width:var(--max-w);margin:calc(var(--nav-h) + 20px) auto 0;padding:clamp(20px,4vw,48px) clamp(20px,3vw,48px) 60px}
.detail-hero{display:grid;grid-template-columns:1fr 1fr;gap:clamp(24px,4vw,48px);align-items:start;margin-bottom:40px}
.detail-img{aspect-ratio:1;border-radius:var(--radius-xl);overflow:hidden;position:relative;background:var(--paper-card);box-shadow:var(--shadow-l)}
.detail-img .fb-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:0;pointer-events:none}
.detail-img .fb-wrap .fb-icon{font-size:clamp(80px,12vw,140px);opacity:.2}
.detail-img img{width:100%;height:100%;object-fit:cover;position:relative;z-index:1}
.detail-info{position:sticky;top:calc(var(--nav-h) + 24px)}
.detail-card{background:#fff;border-radius:var(--radius-xl);padding:clamp(24px,3vw,40px);box-shadow:var(--shadow);border:1px solid var(--line-l)}
.detail-card .tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.detail-card .tags span{padding:4px 12px;border-radius:100px;font-size:11px;font-weight:600;background:var(--green-soft);color:var(--green)}
.detail-card h1{font-size:clamp(22px,2.4vw,30px);font-weight:700;letter-spacing:-.02em;margin-bottom:20px;line-height:1.2}
.detail-card h1 .en{display:block;font-size:clamp(14px,1.4vw,18px);color:var(--muted-l);margin-top:4px;font-weight:600}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.field{display:flex;flex-direction:column;padding:10px 14px;background:var(--paper);border-radius:var(--radius-sm)}
.field .fl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
.field .fl .en{font-family:var(--font-sans);font-weight:500;font-size:9px;color:var(--muted-l)}
.field .fv{font-size:13px;font-weight:600;color:var(--ink)}
.section-t{font-size:13px;font-weight:700;color:var(--green);margin:16px 0 8px;letter-spacing:.02em}
.section-c{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:8px}
.section-c ol{padding-left:20px}
.section-c ol li{margin-bottom:4px}
.nutri-cta{display:inline-flex;align-items:center;gap:8px;margin-top:20px;padding:12px 24px;border:none;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1);font-family:var(--font-sans);background:var(--green);color:#fff;box-shadow:0 4px 16px rgba(11,94,62,.2);width:100%;justify-content:center}
.nutri-cta:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(11,94,62,.3)}
.nutri-cta svg{transition:transform .3s}
.nutri-cta:hover svg{transform:translateX(4px)}
.detail-extra{display:grid;gap:24px;margin-bottom:40px}
.extra-section{background:#fff;border-radius:var(--radius-l);padding:24px 28px;box-shadow:var(--shadow-card);border:1px solid var(--line-l)}
.extra-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-bottom:12px}
.extra-taste{font-size:clamp(16px,1.6vw,20px);font-weight:600;color:var(--ink);font-style:italic;line-height:1.4}
.extra-scenes{display:flex;flex-wrap:wrap;gap:8px}
.scene-tag{padding:8px 16px;border-radius:100px;font-size:13px;background:var(--green-soft);color:var(--green);font-weight:500}
.extra-revs{display:grid;gap:12px}
.rev-card{padding:14px 18px;background:var(--paper);border-radius:var(--radius-sm)}
.rev-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.rev-user{font-size:12px;font-weight:600;color:var(--muted)}
.rev-stars{font-size:12px;color:var(--gold);letter-spacing:2px}
.rev-text{font-size:14px;color:var(--ink);line-height:1.5}
.extra-price{font-size:16px;font-weight:700;color:var(--green)}
.detail-nav{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.detail-nav button{padding:20px 24px;border:1px solid var(--line-l);border-radius:var(--radius);background:#fff;text-align:left;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1);font-family:var(--font-sans)}
.detail-nav button:hover{border-color:var(--green);box-shadow:var(--shadow-sm);transform:translateY(-2px)}
.detail-nav button:disabled{opacity:.4;cursor:default;transform:none!important}
.detail-nav button .dn-label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}
.detail-nav button .dn-name{font-size:14px;font-weight:700;color:var(--ink)}

/* ═══ NUTRITION PAGE ═══ */
.nutri{max-width:var(--max-w);margin:calc(var(--nav-h) + 20px) auto 0;padding:clamp(20px,4vw,48px) clamp(20px,3vw,48px) 60px}
.nutri-banner{text-align:center;margin-bottom:32px}
.nutri-banner h2{font-size:clamp(24px,2.8vw,36px);font-weight:700;margin-bottom:8px}
.nutri-banner h2 .en{display:block;font-size:clamp(14px,1.4vw,18px);color:var(--muted-l);margin-top:4px}
.nutri-banner p{font-size:14px;color:var(--muted)}
.nutri-card-wrap{background:#fff;border-radius:var(--radius-xl);padding:clamp(20px,3vw,32px);box-shadow:var(--shadow);border:1px solid var(--line-l);margin-bottom:24px}
.nutri-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px}
.nutri-cell{text-align:center;padding:16px 8px;border-radius:var(--radius);background:var(--paper);transition:all .3s}
.nutri-cell:hover{transform:translateY(-3px);box-shadow:var(--shadow-sm)}
.nutri-cell.zero{background:var(--green-soft);border:1px solid var(--green-pale)}
.nutri-cell .ni{font-size:28px;margin-bottom:6px;line-height:1}
.nutri-cell .nl{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}
.nutri-cell .nv{font-size:clamp(20px,2.2vw,28px);font-weight:700;color:var(--ink);line-height:1}
.nutri-cell.zero .nv{color:var(--green)}
.nutri-cell .nu{font-size:10px;color:var(--muted-l);margin-top:4px}

/* ═══ BOTTOM SECTION ═══ */
.btm{max-width:var(--max-w);margin:0 auto;padding:clamp(40px,5vw,80px) clamp(24px,4vw,60px)}
.btm.hidden{display:none}
.btm-bar{display:grid;grid-template-columns:1.4fr 1fr;gap:clamp(24px,4vw,48px);align-items:start;background:#fff;border-radius:var(--radius-xl);padding:clamp(28px,3.5vw,48px);box-shadow:var(--shadow);border:1px solid var(--line-l)}
.btm-bar h3{font-size:clamp(20px,2.2vw,28px);font-weight:700;line-height:1.3;letter-spacing:-.02em;margin-bottom:20px}
.btm-btns{display:flex;gap:12px;flex-wrap:wrap}
.btm-btns button{padding:12px 24px;border:none;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;transition:all .4s;font-family:var(--font-sans)}
.btm-btns button:first-child{background:var(--green);color:#fff;box-shadow:0 4px 16px rgba(11,94,62,.2)}
.btm-btns button:first-child:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(11,94,62,.3)}
.btm-btns button:last-child{background:var(--paper);color:var(--ink);border:1px solid var(--line)}
.btm-btns button:last-child:hover{background:var(--line-l)}
.btm-info{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btm-info div{padding:8px 12px;border-radius:var(--radius-sm);background:var(--paper)}
.btm-info strong{display:block;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:2px}
.btm-info span{font-size:12px;color:var(--ink)}

/* ═══ FOOTER ═══ */
.end{padding:20px clamp(24px,4vw,48px);text-align:center;font-size:11px;color:var(--muted);border-top:1px solid var(--line-l)}

/* ═══ LANG SWITCH ═══ */
.lang-switch{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;gap:2px;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:3px;border-radius:100px;box-shadow:var(--shadow);border:1px solid var(--line-l)}
.lang-switch button{padding:6px 14px;border:none;border-radius:100px;font-size:11px;font-weight:600;cursor:pointer;transition:all .3s;font-family:var(--font-sans);background:none;color:var(--muted)}
.lang-switch button.active{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(11,94,62,.2)}

/* ═══ MOBILE ═══ */
@media(max-width:860px){
  .nav{height:64px;padding:0 16px}
  .nav-logo .logo-img{height:26px;max-width:130px}
  .nav-logo .brand-group .brand-name{font-size:17px}
  .nav-logo .brand-group .brand-name span{font-size:12px}
  .nav-logo .brand-group .brand-sub{display:none}
  .nav-tabs{background:none;padding:0;gap:0}
  .nav-tabs button{padding:6px 10px;font-size:10px}
  .nav-tabs button .tab-en{display:none}
  .hero-inner{grid-template-columns:1fr;gap:24px;padding:100px 20px 60px}
  .hero-floats{justify-self:center;max-width:320px;padding:0}
  .hero-float{padding:12px 16px}
  .hero-float .fv{font-size:clamp(18px,5vw,24px)}
  .trust{grid-template-columns:1fr 1fr;margin:-24px 12px 0;gap:0}
  .trust-item:first-child{border-radius:var(--radius) 0 0 0}
  .trust-item:nth-child(2){border-radius:0 var(--radius) 0 0;border-right:none}
  .trust-item:nth-child(3){border-radius:0 0 0 var(--radius)}
  .trust-item:last-child{border-radius:0 0 var(--radius) 0}
  .feature{grid-template-columns:1fr;gap:20px;margin-bottom:48px}.feature.rev{direction:ltr}.feature.rev>*{direction:ltr}
  .feature-img{aspect-ratio:4/3;border-radius:var(--radius)}
  .feature-txt{max-width:none}
  .detail-hero{grid-template-columns:1fr;gap:20px}
  .detail-img{aspect-ratio:4/3}
  .detail-info{position:static}
  .detail-nav{grid-template-columns:1fr}
  .btm-bar{grid-template-columns:1fr;gap:24px}
  .btm-info{grid-template-columns:1fr}
  .nutri-row{grid-template-columns:repeat(3,1fr)}
  .film-item{flex:0 0 clamp(160px,45vw,220px)}
  .global-bar{gap:4px;padding:12px 16px}
  .global-item{padding:4px 10px;font-size:10px}
  .values{grid-template-columns:1fr}
  .tech-grid{grid-template-columns:1fr 1fr}
  .bigrow{padding:20px}
  .fab{top:72px;left:12px;padding:8px 14px;font-size:12px}
  .lang-switch{bottom:16px;right:16px}
}

@media(max-width:480px){
  .nav-logo .brand-group{display:none}
  .tech-grid{grid-template-columns:1fr}
  .nutri-row{grid-template-columns:repeat(2,1fr)}
  .hero-txt h1{font-size:clamp(28px,10vw,36px)}
  .hero-eyebrow{font-size:9px;padding:4px 12px}
  .detail-card{padding:20px}
  .fields{grid-template-columns:1fr}
}

/* ═══ IMAGE FALLBACK SHARED ═══ */
.fb-wrap.pf,.fb-wrap.df,.fb-wrap.bg-fb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:0;pointer-events:none}
.fb-wrap.pf .fb-icon,.fb-wrap.df .fb-icon,.fb-wrap.bg-fb .fb-icon{font-size:clamp(48px,10vw,100px);opacity:.25;line-height:1}
.has-img{position:relative;overflow:hidden}
.has-img img{position:relative;z-index:1;width:100%;height:100%;object-fit:cover}

/* ═══ FADE OVERLAY INSET ═══ for sections using bgSection without dark */
.sec-bg:not(.dark) .inner{padding-top:clamp(50px,6vw,100px);padding-bottom:clamp(50px,6vw,100px)}

.bigrow.clickable,.row.clickable,.value.clickable{cursor:pointer;transition:all .35s cubic-bezier(.16,1,.3,1);position:relative}
.bigrow.clickable:hover,.row.clickable:hover,.value.clickable:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.bigrow.clickable::after,.row.clickable::after,.value.clickable::after{content:"→";position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--green);opacity:0;transition:opacity .3s}
.bigrow.clickable:hover::after,.row.clickable:hover::after,.value.clickable:hover::after{opacity:.6}
.brand-sec{padding:20px 0;border-bottom:1px solid var(--line-l)}
.brand-sec:last-child{border-bottom:none}

/* ═══ DETAIL VISUAL CARDS ═══ */
.dtl-hero{position:relative;overflow:hidden}
.dtl-hero .hero-deco{position:absolute;right:-20px;top:-20px;font-size:120px;opacity:.06;line-height:1;pointer-events:none}
.dtl-grid{display:flex;flex-direction:column;gap:16px}
.dtl-card{background:#fff;border-radius:var(--radius-l);padding:28px;box-shadow:var(--shadow-card);border:1px solid var(--line-l);transition:all .35s cubic-bezier(.16,1,.3,1)}
.dtl-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)!important}
.dtl-card .card-num{width:40px;height:40px;border-radius:10px;background:var(--green-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dtl-card .card-num span{font-size:16px;font-weight:700;color:var(--green)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:var(--radius-l);padding:28px;box-shadow:var(--shadow-card);border:1px solid var(--line-l);text-align:center}
.stat-card .stat-val{font-size:48px;font-weight:700;display:block;line-height:1;margin-bottom:8px}
.stat-card .stat-lbl{font-size:13px;color:var(--muted)}
.highlight-box{background:var(--green-soft);border-radius:var(--radius-l);padding:20px 24px;margin-bottom:24px;border-left:4px solid var(--green)}
.highlight-box p{font-size:14px;color:var(--green);font-weight:600;line-height:1.6}
.drug-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px}
.drug-card{background:#fff;border-radius:var(--radius-l);padding:24px;box-shadow:var(--shadow-card);border:1px solid var(--line-l);text-align:center;transition:all .35s}
.drug-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)!important}
.drug-card .drug-icon{font-size:36px;line-height:1;margin-bottom:10px;display:block}
.drug-card h4{font-size:16px;font-weight:700;margin-bottom:4px}
.drug-card .drug-type{font-size:12px;color:var(--muted-l);margin-bottom:10px}
.drug-card .drug-usage{font-size:13px;color:var(--muted);line-height:1.6}
.age-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.age-card{background:#fff;border-radius:var(--radius-l);padding:24px;box-shadow:var(--shadow-card);border:1px solid var(--line-l)}
.age-card .age-emoji{font-size:28px;display:block;margin-bottom:8px}
.age-card h4{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--green)}
.age-card p{font-size:13px;color:var(--muted);line-height:1.7}
@media(max-width:600px){.stat-grid,.drug-grid,.age-grid{grid-template-columns:1fr}}

/* ═══ STORY CARDS (用户故事) ═══ */
.story-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:clamp(16px,2vw,28px)}
.story-card{background:#fff;border-radius:var(--radius-l);padding:clamp(24px,2.5vw,36px);box-shadow:var(--shadow-card);border:1px solid var(--line-l);transition:all .4s cubic-bezier(.16,1,.3,1)}
.story-card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.story-card .sc-avatar{width:56px;height:56px;border-radius:50%;background:var(--green-soft);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px}
.story-card .sc-name{font-size:16px;font-weight:700;margin-bottom:4px}
.story-card .sc-meta{font-size:12px;color:var(--muted);margin-bottom:16px}
.story-card .sc-before{padding:12px 16px;background:#fff5f5;border-radius:var(--radius-sm);border-left:3px solid #ff8a73;margin-bottom:12px}
.story-card .sc-after{padding:12px 16px;background:var(--green-soft);border-radius:var(--radius-sm);border-left:3px solid var(--green)}
.story-card .sc-before .sc-tag,.story-card .sc-after .sc-tag{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;display:block}
.story-card .sc-before .sc-tag{color:#ff8a73}
.story-card .sc-after .sc-tag{color:var(--green)}
.story-card .sc-text{font-size:13px;color:var(--muted);line-height:1.6}
.sec-bg.dark .story-card{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08)}
.sec-bg.dark .story-card .sc-before{background:rgba(255,138,115,.1)}
.sec-bg.dark .story-card .sc-after{background:rgba(11,94,62,.15)}

/* ═══ MEDIA LOGO WALL (媒体报道) ═══ */
.media-wall{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:32px}
.media-logo{background:#fff;border-radius:var(--radius);padding:20px 16px;text-align:center;border:1px solid var(--line-l);transition:all .3s;font-size:13px;font-weight:700;color:var(--muted)}
.media-logo:hover{border-color:var(--green-pale);box-shadow:var(--shadow-sm);color:var(--ink)}
.media-logo .ml-icon{font-size:28px;display:block;margin-bottom:8px;opacity:.6}
.sec-bg.dark .media-logo{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08);color:rgba(255,255,255,.7)}
.award-timeline{display:flex;flex-direction:column;gap:16px}
.award-item{display:grid;grid-template-columns:auto 1fr;gap:16px 20px;align-items:start;padding:16px 20px;background:rgba(255,255,255,.05);border-radius:var(--radius);border:1px solid rgba(255,255,255,.08)}
.sec-bg:not(.dark) .award-item{background:#fff;border-color:var(--line-l)}
.award-item .aw-year{font-size:20px;font-weight:700;color:var(--gold);font-family:var(--font-serif);line-height:1;white-space:nowrap}
.award-item h4{font-size:15px;font-weight:700;margin-bottom:4px}
.award-item p{font-size:13px;color:var(--muted);line-height:1.5}
.sec-bg.dark .award-item p{color:rgba(255,255,255,.65)}

/* ═══ FAQ ACCORDION ═══ */
.faq-list{display:flex;flex-direction:column;gap:12px;max-width:760px;margin:0 auto}
.faq-item{background:#fff;border-radius:var(--radius);border:1px solid var(--line-l);overflow:hidden;transition:all .3s}
.faq-item:hover{border-color:var(--green-pale);box-shadow:var(--shadow-sm)}
.sec-bg.dark .faq-item{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08)}
.faq-q{padding:18px 24px;font-size:15px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;transition:color .3s}
.faq-q:hover{color:var(--green)}
.faq-q .faq-icon{font-size:20px;color:var(--green);transition:transform .3s;flex-shrink:0}
.faq-item.open .faq-q .faq-icon{transform:rotate(45deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.16,1,.3,1)}
.faq-item.open .faq-a{max-height:300px}
.faq-a-inner{padding:0 24px 18px;font-size:14px;color:var(--muted);line-height:1.7}
.sec-bg.dark .faq-a-inner{color:rgba(255,255,255,.65)}

/* ═══ CHANNEL GRID (购买渠道) ═══ */
.channel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:clamp(16px,2vw,24px)}
.channel-card{background:#fff;border-radius:var(--radius-l);padding:clamp(24px,2.5vw,32px);text-align:center;border:1px solid var(--line-l);box-shadow:var(--shadow-card);transition:all .4s cubic-bezier(.16,1,.3,1);cursor:pointer}
.channel-card:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--green-pale)}
.sec-bg.dark .channel-card{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08)}
.channel-card .ch-icon{font-size:40px;margin-bottom:12px;display:block}
.channel-card h4{font-size:16px;font-weight:700;margin-bottom:6px}
.channel-card .ch-desc{font-size:13px;color:var(--muted);line-height:1.5}
.sec-bg.dark .channel-card .ch-desc{color:rgba(255,255,255,.6)}

/* ═══ TIMELINE (品牌时间线) ═══ */
.timeline{position:relative;padding-left:clamp(24px,4vw,40px)}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--green),var(--gold));border-radius:2px}
.tl-item{position:relative;padding-bottom:clamp(24px,3vw,36px)}
.tl-item:last-child{padding-bottom:0}
.tl-item::before{content:'';position:absolute;left:calc(-1 * clamp(24px,4vw,40px) + 3px);top:4px;width:14px;height:14px;border-radius:50%;background:var(--green);border:3px solid #fff;box-shadow:0 0 0 2px var(--green);z-index:1}
.tl-item .tl-year{font-size:13px;font-weight:700;color:var(--gold);letter-spacing:.04em;margin-bottom:4px;font-family:var(--font-sans)}
.tl-item h4{font-size:clamp(15px,1.4vw,18px);font-weight:700;margin-bottom:6px}
.tl-item p{font-size:clamp(13px,1.1vw,14px);color:var(--muted);line-height:1.6}
.sec-bg.dark .tl-item p{color:rgba(255,255,255,.65)}
.sec-bg.dark .tl-item::before{border-color:var(--green-d)}

/* ═══ WORLD MAP (全球版图) ═══ */
.world-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:16px;margin-bottom:32px}
.world-stat{text-align:center;padding:20px 12px;background:rgba(255,255,255,.05);border-radius:var(--radius);border:1px solid rgba(255,255,255,.08)}
.sec-bg:not(.dark) .world-stat{background:#fff;border-color:var(--line-l);box-shadow:var(--shadow-card)}
.world-stat .ws-val{font-size:clamp(28px,3vw,40px);font-weight:700;color:var(--green);line-height:1;margin-bottom:6px;font-family:var(--font-serif)}
.sec-bg.dark .world-stat .ws-val{color:var(--gold)}
.world-stat .ws-lbl{font-size:12px;color:var(--muted)}
.region-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.region-card{padding:16px 20px;background:rgba(255,255,255,.05);border-radius:var(--radius);border:1px solid rgba(255,255,255,.08)}
.sec-bg:not(.dark) .region-card{background:#fff;border-color:var(--line-l)}
.region-card .rg-name{font-size:14px;font-weight:700;margin-bottom:6px}
.region-card .rg-countries{font-size:12px;color:var(--muted);line-height:1.5}
.sec-bg.dark .region-card .rg-countries{color:rgba(255,255,255,.6)}

/* ═══ PRODUCTION FLOW (生产线流程) ═══ */
.flow-steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0;margin-top:20px}
.flow-step{position:relative;padding:24px 16px;text-align:center;border-right:1px solid var(--line-l)}
.flow-step:last-child{border-right:none}
@media(max-width:600px){.flow-step{border-right:none;border-bottom:1px solid var(--line-l);padding:16px}.flow-step:last-child{border-bottom:none}}
.flow-step .fs-num{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.1em;margin-bottom:8px}
.flow-step .fs-icon{font-size:36px;margin-bottom:8px;display:block}
.flow-step h5{font-size:14px;font-weight:700;margin-bottom:6px}
.flow-step p{font-size:12px;color:var(--muted);line-height:1.5}
.sec-bg.dark .flow-step{border-right-color:rgba(255,255,255,.08);border-bottom-color:rgba(255,255,255,.08)}
.sec-bg.dark .flow-step p{color:rgba(255,255,255,.6)}

/* ═══ MEAL PLAN (三餐方案) ═══ */
.meal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:clamp(16px,2vw,24px)}
.meal-card{background:#fff;border-radius:var(--radius-l);padding:clamp(24px,2.5vw,32px);box-shadow:var(--shadow-card);border:1px solid var(--line-l);transition:all .4s}
.meal-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.sec-bg.dark .meal-card{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08)}
.meal-card .mc-stage{display:inline-block;font-size:11px;font-weight:700;color:var(--green);background:var(--green-soft);padding:4px 12px;border-radius:100px;margin-bottom:14px}
.sec-bg.dark .meal-card .mc-stage{background:rgba(11,94,62,.2)}
.meal-card h4{font-size:16px;font-weight:700;margin-bottom:14px}
.meal-img{width:100%;height:140px;border-radius:var(--radius) var(--radius) 0 0;overflow:hidden;background:var(--paper-card)}
.meal-img img{width:100%;height:100%;object-fit:cover}
.meal-info{padding:16px 20px 20px}
.meal-info p{font-size:13px;color:var(--muted);line-height:1.7}
.recipe-img{width:100%;height:140px;border-radius:var(--radius) var(--radius) 0 0;overflow:hidden;background:var(--paper-card)}
.recipe-img img{width:100%;height:100%;object-fit:cover}
.recipe-info{padding:16px 20px 12px}
.recipe-info p{font-size:13px;color:var(--muted);line-height:1.7}
.recipe-tag{display:inline-block;font-size:10px;padding:3px 10px;border-radius:100px;background:var(--green-soft);color:var(--green);font-weight:600;margin:8px 0 0}
.meal-row{display:grid;grid-template-columns:auto 1fr auto;gap:8px 12px;padding:8px 0;border-bottom:1px dashed var(--line-l);font-size:13px;align-items:start}
.meal-row:last-child{border-bottom:none}
.meal-row .mr-time{font-weight:600;color:var(--green);white-space:nowrap;font-size:12px}
.meal-row .mr-food{color:var(--ink)}
.meal-row .mr-data{font-size:11px;color:var(--muted);white-space:nowrap}
.sec-bg.dark .meal-row .mr-food{color:rgba(255,255,255,.85)}
.sec-bg.dark .meal-row{border-bottom-color:rgba(255,255,255,.08)}

/* ═══ COMPARISON TABLE ENHANCED (食材对比) ═══ */
.cmp-table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-card)}
.cmp-table thead th{background:var(--green);color:#fff;padding:14px 16px;text-align:center;font-weight:600;font-size:12px;white-space:nowrap}
.cmp-table thead th:first-child{text-align:left}
.cmp-table thead th.highlight{background:var(--green-d)}
.cmp-table tbody td{padding:12px 16px;border-bottom:1px solid var(--line-l);text-align:center}
.cmp-table tbody td:first-child{text-align:left;font-weight:600}
.cmp-table tbody td.highlight{background:var(--green-soft);color:var(--green);font-weight:700}
.cmp-table tbody tr:last-child td{border-bottom:none}
.sec-bg.dark .cmp-table{background:rgba(255,255,255,.06)}
.sec-bg.dark .cmp-table tbody td{border-bottom-color:rgba(255,255,255,.08);color:rgba(255,255,255,.85)}
.sec-bg.dark .cmp-table tbody td.highlight{background:rgba(11,94,62,.15)}

/* ═══ MYTH CARDS (误区辨析) ═══ */
.myth-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:clamp(16px,2vw,24px)}
.myth-card{background:#fff;border-radius:var(--radius-l);overflow:hidden;border:1px solid var(--line-l);box-shadow:var(--shadow-card);transition:all .4s}
.myth-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.sec-bg.dark .myth-card{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08)}
.myth-card .myth-q{padding:16px 20px;background:#fff5f5;border-bottom:2px solid #ff8a73;font-size:14px;font-weight:600;color:#ff8a73;line-height:1.4}
.myth-card .myth-a{padding:16px 20px}
.myth-card .myth-a .ma-tag{font-size:10px;font-weight:700;color:var(--green);letter-spacing:.1em;margin-bottom:6px;display:block}
.myth-card .myth-a p{font-size:13px;color:var(--muted);line-height:1.6}
.sec-bg.dark .myth-card .myth-q{background:rgba(255,138,115,.1)}
.sec-bg.dark .myth-card .myth-a p{color:rgba(255,255,255,.65)}

/* ═══ RECIPE CARDS (食谱) ═══ */
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:clamp(16px,2vw,24px)}
.recipe-card{background:#fff;border-radius:var(--radius-l);overflow:hidden;border:1px solid var(--line-l);box-shadow:var(--shadow-card);transition:all .4s}
.recipe-card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.sec-bg.dark .recipe-card{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08)}
.recipe-card .rc-head{padding:20px 24px 12px}
.recipe-card .rc-icon{font-size:36px;display:block;margin-bottom:8px}
.recipe-card h4{font-size:16px;font-weight:700;margin-bottom:4px}
.recipe-card .rc-time{font-size:12px;color:var(--muted)}
.recipe-card .rc-body{padding:0 24px 16px}
.recipe-card .rc-ingredients{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6;padding:10px 12px;background:var(--paper);border-radius:var(--radius-sm)}
.sec-bg.dark .recipe-card .rc-ingredients{background:rgba(255,255,255,.04)}
.recipe-card .rc-steps{font-size:13px;color:var(--ink);line-height:1.7;padding-left:18px}
.sec-bg.dark .recipe-card .rc-steps{color:rgba(255,255,255,.8)}
.recipe-card .rc-steps li{margin-bottom:4px}
.recipe-card .rc-nutri{display:flex;gap:8px;flex-wrap:wrap;padding:0 24px 20px}
.recipe-card .rc-nutri span{font-size:10px;padding:4px 8px;border-radius:100px;background:var(--green-soft);color:var(--green);font-weight:600}

/* ═══ CALCULATOR (计算器) ═══ */
.calc-box{max-width:640px;margin:0 auto;background:#fff;border-radius:var(--radius-xl);padding:clamp(24px,3vw,40px);box-shadow:var(--shadow);border:1px solid var(--line-l)}
.sec-bg.dark .calc-box{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08)}
.calc-field{margin-bottom:20px}
.calc-field label{display:block;font-size:13px;font-weight:600;margin-bottom:8px}
.calc-field select,.calc-field input{width:100%;padding:12px 16px;border:1px solid var(--line);border-radius:var(--radius);font-size:14px;font-family:var(--font-sans);background:#fff;color:var(--ink)}
.sec-bg.dark .calc-field select,.sec-bg.dark .calc-field input{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12);color:#fff}
.calc-result{margin-top:24px;padding:20px;background:var(--green-soft);border-radius:var(--radius);border-left:4px solid var(--green)}
.sec-bg.dark .calc-result{background:rgba(11,94,62,.15)}
.calc-result .cr-val{font-size:32px;font-weight:700;color:var(--green);line-height:1;margin-bottom:4px}
.calc-result .cr-lbl{font-size:13px;color:var(--muted)}
.calc-suggest{margin-top:16px;display:grid;gap:8px}
.calc-suggest .cs-item{display:grid;grid-template-columns:auto 1fr auto;gap:8px 12px;padding:10px 14px;background:#fff;border-radius:var(--radius-sm);border:1px solid var(--line-l);font-size:13px;align-items:center}
.sec-bg.dark .calc-suggest .cs-item{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08)}
.calc-suggest .cs-item .cs-icon{font-size:20px}
.calc-suggest .cs-item .cs-name{font-weight:600}
.calc-suggest .cs-item .cs-data{font-size:11px;color:var(--muted)}

/* Quick-add food buttons */
.qadd{display:inline-block;font-size:11px;padding:4px 10px;background:var(--green-soft);color:var(--green);border-radius:100px;cursor:pointer;transition:all .2s;font-weight:600;border:1px solid transparent}
.qadd:hover{background:var(--green);color:#fff;border-color:var(--green)}
/* Calculator result cells */
.cr-cell{text-align:center;padding:16px 12px;background:var(--paper-card);border-radius:var(--radius);border:1px solid var(--line-l)}
.crv{font-size:24px;font-weight:700;color:var(--green);line-height:1.1;margin-bottom:4px;font-family:var(--font-serif)}
.crlab{font-size:11px;color:var(--muted);font-weight:500}


/* ═══ CONTACT FORM (联系咨询) ═══ */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(24px,4vw,48px);max-width:880px;margin:0 auto}
@media(max-width:680px){.contact-grid{grid-template-columns:1fr}}
.contact-form{display:grid;gap:16px}
.contact-form input,.contact-form select,.contact-form textarea{width:100%;padding:12px 16px;border:1px solid var(--line);border-radius:var(--radius);font-size:14px;font-family:var(--font-sans);background:#fff;color:var(--ink)}
.sec-bg.dark .contact-form input,.sec-bg.dark .contact-form select,.sec-bg.dark .contact-form textarea{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12);color:#fff}
.contact-form textarea{resize:vertical;min-height:100px}
.contact-info-card{background:rgba(255,255,255,.05);border-radius:var(--radius-l);padding:clamp(24px,2.5vw,32px);border:1px solid rgba(255,255,255,.08)}
.sec-bg:not(.dark) .contact-info-card{background:#fff;border-color:var(--line-l);box-shadow:var(--shadow-card)}
.contact-info-card h4{font-size:16px;font-weight:700;margin-bottom:16px}
.contact-info-card .ci-row{display:grid;grid-template-columns:auto 1fr;gap:12px;padding:10px 0;border-bottom:1px solid var(--line-l);font-size:13px}
.sec-bg.dark .contact-info-card .ci-row{border-bottom-color:rgba(255,255,255,.08)}
.contact-info-card .ci-row:last-child{border-bottom:none}
.contact-info-card .ci-row .ci-icon{font-size:20px}
.contact-info-card .ci-row .ci-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
.contact-info-card .ci-row .ci-val{font-size:14px;font-weight:600}

/* ═══ COMPARISON TOOL (产品对比) ═══ */
.cmp-tool{max-width:900px;margin:0 auto}
.cmp-select-row{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:end;margin-bottom:24px}
@media(max-width:600px){.cmp-select-row{grid-template-columns:1fr;gap:12px}}
.cmp-select-row select{width:100%;padding:12px 16px;border:1px solid var(--line);border-radius:var(--radius);font-size:14px;font-family:var(--font-sans);background:#fff}
.sec-bg.dark .cmp-select-row select{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12);color:#fff}
.cmp-vs{text-align:center;font-size:20px;font-weight:700;color:var(--gold);padding-bottom:12px}

/* ═══ COOKING TIPS (烹饪指南) ═══ */
.cook-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:clamp(12px,1.5vw,20px)}
.cook-card{background:#fff;border-radius:var(--radius-l);padding:clamp(20px,2vw,28px);border:1px solid var(--line-l);box-shadow:var(--shadow-card);transition:all .35s;text-align:center}
.cook-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.sec-bg.dark .cook-card{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08)}
.cook-card .ck-icon{font-size:40px;margin-bottom:10px;display:block}
.cook-card h5{font-size:14px;font-weight:700;margin-bottom:8px}
.cook-card p{font-size:12px;color:var(--muted);line-height:1.5}
.sec-bg.dark .cook-card p{color:rgba(255,255,255,.6)}

/* ═══ QA CARDS (有需要的人群问答) ═══ */
.qa-grid{display:grid;gap:16px;max-width:760px;margin:0 auto}
.qa-card{background:#fff;border-radius:var(--radius-l);padding:clamp(20px,2vw,28px);border:1px solid var(--line-l);box-shadow:var(--shadow-card)}
.sec-bg.dark .qa-card{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08)}
.qa-card .qa-q{display:flex;gap:12px;align-items:start;margin-bottom:12px}
.qa-card .qa-q .qa-badge{background:var(--green);color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.qa-card .qa-q h5{font-size:15px;font-weight:700;line-height:1.4}
.qa-card .qa-a{font-size:13px;color:var(--muted);line-height:1.7;padding-left:44px}
.sec-bg.dark .qa-card .qa-a{color:rgba(255,255,255,.65)}

/* ═══ SCHOOL GUIDE (学校就餐指南) ═══ */
.guide-list{display:flex;flex-direction:column;gap:16px}
.guide-item{display:grid;grid-template-columns:auto 1fr;gap:16px 20px;align-items:start;padding:20px 24px;background:rgba(255,255,255,.05);border-radius:var(--radius);border:1px solid rgba(255,255,255,.08)}
.sec-bg:not(.dark) .guide-item{background:#fff;border-color:var(--line-l)}
.guide-item .gi-num{font-size:28px;font-weight:700;color:var(--green);font-family:var(--font-serif);line-height:1}
.sec-bg.dark .guide-item .gi-num{color:var(--gold)}
.guide-item h4{font-size:15px;font-weight:700;margin-bottom:6px}
.guide-item p{font-size:13px;color:var(--muted);line-height:1.6}
.sec-bg.dark .guide-item p{color:rgba(255,255,255,.65)}

/* ═══ PREGNANCY (孕期管理) ═══ */
.preg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:clamp(16px,2vw,24px)}
.preg-card{background:#fff;border-radius:var(--radius-l);padding:clamp(24px,2.5vw,32px);border:1px solid var(--line-l);box-shadow:var(--shadow-card)}
.sec-bg.dark .preg-card{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08)}
.preg-card .pc-icon{font-size:36px;margin-bottom:12px;display:block}
.preg-card h4{font-size:16px;font-weight:700;margin-bottom:8px}
.preg-card p{font-size:13px;color:var(--muted);line-height:1.7}
.sec-bg.dark .preg-card p{color:rgba(255,255,255,.65)}

/* ═══ QUALITY TRACE (品质追溯) ═══ */
.trace-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:0}
.trace-step{padding:24px 20px;text-align:center;border-right:1px solid var(--line-l);position:relative}

function imgOrFallback(img,fb,cls,lazy=true){return `<span class="fb-wrap ${cls}"><span class="fb-icon">${fb}</span></span>`+(img?`<img src="${img}">`:'')}
function bgSection(img,dark,inner){return `<section class="sec-bg reveal ${dark?'dark':''}"><div class="bg-img ph">${imgOrFallback(img,'','bg-fb')}</div><div class="bg-overlay"></div><div class="inner">${inner}</div></section>`}

let _io;
function setupReveal(){
  const sel='.reveal,.clip-reveal';
  if(_io)_io.disconnect();
  _io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');_io.unobserve(e.target);if(e.target.dataset.count)animateCount(e.target.querySelector('b'),e.target.dataset.count)}})},{threshold:.08,rootMargin:'0px 0px -5% 0px'});
  document.querySelectorAll('#app '+sel).forEach(el=>_io.observe(el));
  document.querySelectorAll('#app .mask').forEach((m,i)=>{setTimeout(()=>m.classList.add('show'),200+i*120)});
}
function animateCount(el,target){
  if(!el)return;
  const num=parseFloat(target);
  const unit=target.replace(/[0-9.]/g,'');
  const dur=1500;let start=null;
  function step(t){if(!start)start=t;const p=Math.min((t-start)/dur,1);const ease=1-Math.pow(1-p,3);el.textContent=(num*ease).toFixed(num%1===0?0:1)+unit;if(p<1)requestAnimationFrame(step)}
  requestAnimationFrame(step);
}

function addFood(mealId, foodStr){
  const el=document.getElementById(mealId);
  const cur=el.value.trim();
  el.value=cur+(cur?'+':'')+foodStr;
  updateCalc();
}

function parseMeal(text){
  if(!text||!text.trim()) return [];
  const items=[];
  const parts=text.split(/[+＋、，,]/);
  for(let p of parts){
    p=p.trim();
    if(!p) continue;
    // Try to match "foodName amountWithUnit" or "amount foodName"
    // Common patterns: "米饭200g", "鸡蛋1个", "牛奶250ml", "苹果1个"
    let foodName='', amount=0;
    // Try "foodName number+unit" pattern
    const m1=p.match(/^(.+?)([0-9]+\.?[0-9]*)\s*(g|克|ml|毫升|个|只|条|碗|杯|斤|两|kg|L|盒)$/);
    if(m1){
      foodName=m1[1].trim();
      const num=parseFloat(m1[2]);
      const unit=m1[3];
      amount=estimateWeight(foodName,num,unit);
    } else {
      // Try just "foodName number" 
      const m2=p.match(/^(.+?)([0-9]+\.?[0-9]*)$/);
      if(m2){
        foodName=m2[1].trim();
        amount=parseFloat(m2[2]);
      }
    }
    if(foodName && amount>0){
      // Find matching food in DB
      const match=findFood(foodName);
      if(match) items.push({name:match.key,amount:amount});
    }
  }
  return items;
}

function estimateWeight(foodName,num,unit){
  const name=foodName.toLowerCase();
  // Approximate weights for common units
  if(unit==='g'||unit==='克'||unit==='ml'||unit==='毫升') return num;
  if(unit==='kg') return num*1000;
  if(unit==='L'||unit==='l') return num*1000;
  if(unit==='斤') return num*500;
  if(unit==='两') return num*50;
  if(unit==='个'||unit==='只'||unit==='条'){
    if(name.includes('蛋')) return num*50;
    if(name.includes('苹果')||name.includes('橙')) return num*200;
    if(name.includes('香蕉')) return num*100;
    if(name.includes('猕猴桃')) return num*80;
    if(name.includes('番茄')||name.includes('西红柿')) return num*150;
    if(name.includes('土豆')) return num*150;
    if(name.includes('粽子')) return num*100;
    return num*100; // default
  }
  if(unit==='碗'){
    if(name.includes('饭')||name.includes('米')) return num*200;
    if(name.includes('粥')||name.includes('面')) return num*300;
    return num*200;
  }
  if(unit==='杯') return num*250;
  if(unit==='盒'){
    if(name.includes('森无忧')) return num*180;
    return num*200;
  }
  return num*100;
}

function findFood(input){
  const inp=input.toLowerCase().trim();
  const keys=Object.keys(FOOD_DB);
  // Exact match
  for(let k of keys) if(inp===k) return {key:k};
  // Contains match
  let best=null;
  for(let k of keys){
    if(k.includes(inp)||inp.includes(k)){
      if(!best||k.length>best.length) best=k;
    }
  }
  if(best) return {key:best};
  // Partial keyword matching
  const kwMap={'饭':'米饭','米':'米饭','饭团':'米饭','炒饭':'米饭',
    '鸡':'鸡胸肉','猪':'猪瘦肉','牛':'牛肉','鱼':'鱼肉','虾':'虾仁',
    '蛋':'鸡蛋','面':'面条','包':'全麦面包',
    '奶':'牛奶','豆':'豆腐','浆':'豆浆',
    '菜':'青菜','菠':'菠菜','西':'西兰花','花':'西兰花',
    '果':'苹果','蕉':'香蕉','莓':'蓝莓','果':'苹果',
    '薯':'红薯','瓜':'南瓜','菇':'香菇',
    '坚果':'坚果','核桃':'坚果','杏仁':'坚果',
    '森':'森无忧米饭'};
  for(let [kw,food] of Object.entries(kwMap)){
    if(inp.includes(kw)) return {key:food};
  }
  // Check if it's a common food word in any key
  for(let k of keys){
    if(k.length>=2 && inp.startsWith(k.substring(0,2))) return {key:k};
  }
  return null;
}

function updateCalc(){
  const bkfst=document.getElementById('bkfst')?.value||'';
  const lunch=document.getElementById('lunch')?.value||'';
  const dinner=document.getElementById('dinner')?.value||'';
  
  const allItems=[
    ...parseMeal(bkfst),
    ...parseMeal(lunch),
    ...parseMeal(dinner)
  ];
  
  if(allItems.length===0){
    document.getElementById('crv1').textContent='--';
    document.getElementById('crv2').textContent='--';
    document.getElementById('crv3').textContent='--';
    document.getElementById('crv4').textContent='--';
    document.getElementById('crv5').textContent='--';
    document.getElementById('calcDetail').innerHTML='';
    document.getElementById('calcSuggest').innerHTML='';
    return;
  }
  
  let totalP=0,totalF=0,totalE=0,totalC=0,totalFat=0;
  const detailLines=[];
  for(let item of allItems){
    const f=FOOD_DB[item.name];
    if(!f) continue;
    const ratio=item.amount/100;
    const p=(f.protein*ratio).toFixed(1);
    const fib=(f.fiber*ratio).toFixed(1);
    const e=(f.energy*ratio).toFixed(0);
    detailLines.push(item.name+' '+item.amount+'g → '+_T('蛋白质','Protein')+' '+p+'g · '+_T('纤维','Fiber')+' '+fib+'g · '+_T('能量','Energy')+' '+e+'kcal');
    totalP+=f.protein*ratio;
    totalF+=f.fiber*ratio;
    totalE+=f.energy*ratio;
    totalC+=f.carb*ratio;
    totalFat+=f.fat*ratio;
  }
  
  document.getElementById('crv1').textContent=totalP.toFixed(1)+'g';
  document.getElementById('crv2').textContent=totalF.toFixed(1)+'g';
  document.getElementById('crv3').textContent=Math.round(totalE)+'kcal';
  document.getElementById('crv4').textContent=totalC.toFixed(1)+'g';
  document.getElementById('crv5').textContent=totalFat.toFixed(1)+'g';
  document.getElementById('calcDetail').innerHTML='<div style="background:var(--paper-card);border-radius:8px;padding:12px 16px"><strong>'+_T('按每种食物分解','Per Food Breakdown')+'：</strong><br>'+detailLines.join('<br>')+'</div>';
  
  let sugg='';
  if(totalP<40) sugg+=`<div class="cs-item"><span class="cs-icon">⬆️</span><span class="cs-name">${_T('蛋白质偏低','Protein Low')}</span><span class="cs-data">${_T('建议增加优质蛋白','Add quality protein')}</span></div>`;
  else if(totalP>120) sugg+=`<div class="cs-item"><span class="cs-icon">⬇️</span><span class="cs-name">${_T('蛋白质偏高','Protein High')}</span><span class="cs-data">${_T('建议咨询营养师','Consult dietitian')}</span></div>`;
  else sugg+=`<div class="cs-item"><span class="cs-icon">✅</span><span class="cs-name">${_T('蛋白质合理','Protein OK')}</span><span class="cs-data">${_T('保持在合理范围','Within range')}</span></div>`;
  
  if(totalF<20) sugg+=`<div class="cs-item"><span class="cs-icon">🥬</span><span class="cs-name">${_T('纤维偏少','Fiber Low')}</span><span class="cs-data">${_T('目标25-30g/天','Goal 25-30g/day')}</span></div>`;
  else sugg+=`<div class="cs-item"><span class="cs-icon">✅</span><span class="cs-name">${_T('纤维充足','Fiber Good')}</span><span class="cs-data">${_T('继续保持','Keep it up')}</span></div>`;
  
  sugg+=`<div class="cs-item"><span class="cs-icon">🍚</span><span class="cs-name">${_T('森无忧低蛋白米饭','Senwuyou Rice')}</span><span class="cs-data">${_T('0g蛋白/100g','0g protein')}</span></div>
    <div class="cs-item"><span class="cs-icon">🦠</span><span class="cs-name">${_T('森无忧复合益生菌','Senwuyou Probiotics')}</span><span class="cs-data">${_T('肠道健康','Gut health')}</span></div>`;
  document.getElementById('calcSuggest').innerHTML=sugg;
}

  kidney:{title:'肾脏健康与营养',sections:[{h:'肾脏的营养代谢功能',p:'肾脏在人体中承担着过滤代谢废物、调节水电解质平衡、分泌激素等重要功能。当肾功能下降时，某些营养素的代谢会受到影响，需要调整膳食结构以减轻肾脏负担。'},{h:'不同阶段的营养策略',p:'在肾功能不同阶段，蛋白质、钠、钾、磷的摄入量需要个性化调整。早期以均衡膳食为主，中晚期需根据医生/营养师建议逐步控制某些营养素的摄入量。'},{h:'主食选择的科学性',p:'主食是每日营养摄入的基础。在肾功能下降阶段，选择科学配比的主食尤为重要。森无忧低蛋白米饭可在保证能量供应的基础上，帮助控制蛋白质和磷的摄入量。'},{h:'饮食管理小贴士',p:'选择新鲜食材，减少加工食品；控制食盐用量，善用天然香料调味；注意食物中的隐形钠和磷来源；定期进行营养评估，在专业人士指导下调整饮食方案。'}]},
  pku:{title:'氨基酸代谢与饮食管理',sections:[{h:'了解氨基酸代谢',p:'人体需要20种氨基酸来合成蛋白质。某些氨基酸代谢需要特定酶的参与。当相关酶活性不足时，未代谢的氨基酸可能蓄积，需要通过膳食管理来控制摄入。'},{h:'饮食管理原则',p:'核心原则是限制特定氨基酸的摄入，同时确保其他必需氨基酸和营养素的充足供应。这需要特殊的膳食方案和科学的营养配比。'},{h:'低蛋白主食的价值',p:'森无忧低蛋白系列主食几乎不含苯丙氨酸，可帮助特殊氨基酸代谢需求的人群在享受正常主食的同时，有效控制特定氨基酸摄入。'},{h:'长期管理建议',p:'饮食管理是长期的过程，需要家庭、学校和医疗团队的多方配合。定期监测相关指标，根据生长发育阶段调整饮食方案。'}]},

const ACADEMY_TOPICS={
  protein:{title:'蛋白质与健康',sections:[{h:'蛋白质的基础知识',p:'蛋白质是生命的物质基础，由20种氨基酸组成，其中9种为必需氨基酸，需通过食物摄取。蛋白质参与构建和修复组织、合成酶和激素、维持免疫功能。'},{h:'蛋白质的推荐摄入量',p:'中国营养学会推荐成人每日蛋白质摄入量为每公斤体重0.8-1.0克。孕妇、哺乳期女性、青少年和老年人等特定人群需求更高。'},{h:'优质蛋白质来源',p:'动物性蛋白（蛋、奶、肉、鱼）含全部必需氨基酸。植物性蛋白（豆类、坚果、谷物）可通过搭配互补提高营养价值。'},{h:'蛋白质与体重管理',p:'适量增加蛋白质摄入有助于增加饱腹感、维持肌肉量。但需注意总体热量平衡，不建议极端高蛋白饮食。'}]},
  fiber:{title:'膳食纤维全解析',sections:[{h:'膳食纤维的定义与分类',p:'膳食纤维是植物中不能被人体消化酶分解的碳水化合物类物质，分为可溶性纤维（果胶、树胶）和不可溶性纤维（纤维素、木质素）。'},{h:'膳食纤维的健康益处',p:'促进肠道蠕动、增加饱腹感、延缓糖分吸收稳定血糖、降低胆固醇。每日推荐摄入量为25-30克。'},{h:'富含膳食纤维的食物',p:'全谷物（糙米、燕麦）、豆类（红豆、绿豆）、蔬菜（西兰花、芹菜）、水果（苹果带皮、梨）、坚果种子。'},{h:'如何逐步增加纤维摄入',p:'从精制主食过渡到全谷物、每天增加一份蔬菜、选择完整水果代替果汁。同时确保充足饮水，避免肠道不适。'}]},
  carbs:{title:'碳水化合物解读',sections:[{h:'碳水化合物的分类',p:'分为简单碳水（单糖/双糖）和复合碳水（淀粉、膳食纤维）。复合碳水消化缓慢，对血糖影响更平稳。'},{h:'血糖生成指数（GI）',p:'GI反映食物升高血糖的速度。低GI（≤55）如全谷物、豆类；中GI（56-69）如全麦面包；高GI（≥70）如白面包。选择低GI食物有助于稳定血糖。'},{h:'主食的科学选择',p:'优先选择全谷物和杂豆类，如糙米、燕麦、荞麦。精制主食可适量，建议与全谷物搭配。每天主食量应根据活动量调整。'},{h:'碳水化合物与运动营养',p:'运动前摄入复合碳水提供持久能量；运动中可补充简单碳水；运动后搭配蛋白质和碳水促进恢复。'}]},
  minerals:{title:'矿物质与微量元素的营养学意义',sections:[{h:'常量元素——钙',p:'钙是骨骼和牙齿的主要成分，参与神经传导和肌肉收缩。成人每日推荐800-1000mg。奶制品、豆制品、深绿色蔬菜是优质来源。'},{h:'常量元素——磷与钾',p:'磷与钙共同构建骨骼，参与能量代谢。钾维持细胞内渗透压。均衡膳食通常能满足需求，特殊健康状态需遵医嘱控制。'},{h:'微量元素——铁与锌',p:'铁是血红蛋白核心成分，缺铁可导致贫血。红肉、动物肝脏、菠菜含铁丰富。锌参与免疫功能，贝壳类海产、瘦肉是优质来源。'},{h:'微量元素——硒与碘',p:'硒是抗氧化酶重要成分。碘是甲状腺激素必需元素。海产品、坚果、加碘盐是主要来源。均衡膳食一般可满足需要。'}]},
  vitamin:{title:'维生素全攻略',sections:[{h:'脂溶性维生素（A、D、E、K）',p:'维生素A维护视力与免疫；D促进钙吸收，可通过日晒合成；E是抗氧化剂；K参与凝血。脂溶性维生素可在体内储存，过量可能蓄积。'},{h:'水溶性维生素（B族、C）',p:'B族维生素参与能量代谢；维生素C是抗氧化剂，促进铁吸收和胶原蛋白合成。不易在体内储存，需每日补充。新鲜蔬果是主要来源。'},{h:'维生素缺乏与补充',p:'长期不均衡饮食可能导致缺乏。优先从食物获取，补充剂应在医生指导下使用，不建议盲目大剂量补充。'},{h:'烹饪对维生素的影响',p:'水溶性维生素易在清洗和煮制中流失。建议急火快炒、蒸制。蔬菜现切现做，减少营养素损失。'}]},
  diet2030:{title:'国民营养计划2030解读',sections:[{h:'计划背景与目标',p:'国务院办公厅2017年印发《国民营养计划（2017-2030年）》，旨在提高国民营养健康水平，到2030年居民营养状况显著改善。'},{h:'七大实施策略',p:'完善营养政策标准体系、加强营养能力建设、强化营养监测、发展营养健康产业、普及营养知识、推动数据共享、开展生命早期1000天行动等。'},{h:'与日常饮食相关的目标',p:'人均每日食盐摄入量降低20%、膳食脂肪供能比控制在30%以内、5岁以下儿童生长迟缓率降至5%以下。'},{h:'我们能做什么',p:'学习膳食指南、优化家庭餐桌、关注食品营养标签、传播科学营养理念。森无忧以实际行动助力国民营养计划。'}]},
  gut:{title:'肠道微生态与健康',sections:[{h:'肠道菌群概览',p:'人体肠道内栖息着约100万亿个微生物，包括细菌、真菌、病毒等，总重量约1-2公斤。它们参与食物消化、维生素合成、免疫调节等关键生理过程。'},{h:'益生菌的作用',p:'益生菌是活的微生物，适量摄入可改善肠道菌群平衡。主要作用包括促进消化吸收、抑制有害菌、增强肠道屏障功能、调节免疫。森无忧复合益生菌含多联菌株，每条约300亿CFU。'},{h:'益生元与后生元',p:'益生元是益生菌的"食物"，如低聚果糖、菊粉等，促进有益菌生长。后生元是益生菌代谢产物，也具有健康益处。膳食纤维是最天然的益生元。'},{h:'维护肠道健康的日常建议',p:'多吃富含膳食纤维的食物、适量补充益生菌、减少精制糖和加工食品、规律作息、适度运动、避免滥用抗生素。肠道健康是全身健康的基础。'}]},
  water:{title:'科学饮水指南',sections:[{h:'人体水分平衡',p:'成年人体内水分约占体重的60%。每天通过呼吸、排汗、排尿等途径流失约2-2.5升水分，需要及时补充以维持正常生理功能。'},{h:'每日饮水建议',p:'中国营养学会建议成人每日饮水1500-1700毫升（约7-8杯）。运动量大、高温环境或出汗多时应适当增加。食物中的水分（汤、蔬果）也计入总量。'},{h:'饮水时机与方式',p:'少量多次优于一次性大量饮用。晨起一杯温水有助于唤醒身体。餐前适量饮水有助于消化。运动前后注意补水，避免脱水和水中毒。'},{h:'不同人群的饮水注意事项',p:'老年人渴觉减退，应定时饮水。儿童活泼好动，需频繁补充。孕期和哺乳期女性需水量增加。某些健康状况需遵医嘱控制饮水。'}]},
  antioxidant:{title:'抗氧化与抗衰老营养',sections:[{h:'自由基与氧化应激',p:'自由基是细胞代谢的副产物，过量会攻击细胞膜、DNA和蛋白质，加速衰老。环境污染、紫外线、吸烟、压力等会加剧自由基产生。'},{h:'天然抗氧化营养素',p:'维生素C（柑橘、猕猴桃）、维生素E（坚果、植物油）、β-胡萝卜素（胡萝卜、南瓜）、花青素（蓝莓、紫薯）、番茄红素（番茄、西瓜）是主要抗氧化物质。'},{h:'抗氧化食物的科学选择',p:'颜色越深的蔬果通常抗氧化能力越强。建议每天摄入多种颜色的蔬果（彩虹饮食法），如红色番茄、橙色胡萝卜、绿色菠菜、紫色蓝莓。'},{h:'生活方式与抗衰老',p:'均衡膳食是基础，配合规律运动、充足睡眠、防晒、戒烟限酒。营养素补充剂不能替代健康饮食。森无忧全谷物主食是均衡膳食的重要组成。'}]},
};
